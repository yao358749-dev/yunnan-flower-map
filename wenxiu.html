<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纹绣月季 · 全国空间热度</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f7f3ee;height:100vh;overflow:hidden;font-family:'KaiTi','STKaiti','楷体',serif}
#map{width:100%;height:100%}
#top{position:absolute;top:24px;left:32px;z-index:999;pointer-events:none}
#top h1{font-size:26px;font-weight:700;color:#3a2828;letter-spacing:4px;margin-bottom:2px;text-shadow:0 1px 0 rgba(255,255,255,0.6)}
#top span{font-size:12px;color:#9a8880;letter-spacing:1px}
#legend{position:absolute;bottom:32px;left:32px;z-index:999;background:rgba(255,255,255,0.9);border-radius:12px;padding:16px 20px;box-shadow:0 2px 16px rgba(0,0,0,0.05)}
#legend .t{font-size:12px;font-weight:700;color:#3a2828;margin-bottom:8px}
#legend .bar{width:160px;height:6px;border-radius:3px;margin:4px 0}
#legend .l{display:flex;justify-content:space-between;font-size:10px;color:#b0a098}
#legend .n{font-size:10px;color:#c0b0a8;margin-top:4px}
#toggle{position:absolute;top:26px;right:32px;z-index:999;display:flex;gap:8px}
#toggle button{padding:7px 18px;border-radius:18px;border:1px solid #ddd0c0;background:rgba(255,255,255,0.82);font-family:inherit;font-size:12px;color:#6a5a50;cursor:pointer;transition:0.25s;letter-spacing:1px}
#toggle button:hover{background:#fff}
#toggle button.on{background:#3a2828;color:#f0e4d4;border-color:#3a2828}
.leaflet-control-zoom{border:none!important;box-shadow:0 2px 8px rgba(0,0,0,0.06)!important}
.leaflet-control-zoom a{background:#fff!important;color:#3a2828!important;border-radius:8px!important;margin:3px!important;border:none!important}
</style>
</head>
<body>

<div id="map"></div>
<div id="top"><h1>纹绣月季 · 空间热度</h1><span>Wenxiu Rose Spatial Heat · 5518 POIs</span></div>

<div id="toggle">
  <button class="on" onclick="setLayer('heat')">热力</button>
  <button onclick="setLayer('point')">点位</button>
</div>

<div id="legend">
  <div class="t">▲ 热度强度</div>
  <div class="bar" style="background:linear-gradient(90deg,#f2ead8,#e8c49a,#d49160,#b85540,#7a2030)"></div>
  <div class="l"><span>低</span><span></span><span></span><span></span><span>高</span></div>
  <div class="n">网红打卡×3 · 花海景区×2 · 旅游×1</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
var heatLayer, markerLayer, map;

map = L.map('map', {
  center: [29, 106],
  zoom: 6,
  minZoom: 3,
  maxZoom: 16,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains: ['1','2','3','4'],
  maxNativeZoom: 18, maxZoom: 18
}).addTo(map);

fetch('data/wenxiu_heat.json')
  .then(r => r.json())
  .then(data => {
    heatLayer = L.heatLayer(data, {
      radius: 30, blur: 20, maxZoom: 12, max: 1.0,
      gradient: {
        0.0: 'rgba(0,0,0,0)',
        0.1: '#f2ead8',
        0.3: '#e8c49a',
        0.5: '#d49160',
        0.7: '#b85540',
        0.85: '#8a2a3a',
        1.0: '#5c1018'
      }
    }).addTo(map);

    markerLayer = L.layerGroup();
    data.forEach(function(pt) {
      if (pt[2] > 0.5) {
        var alpha = pt[2];
        var color = alpha > 0.8 ? '#8a2a3a' : (alpha > 0.65 ? '#b85540' : '#d49160');
        L.circleMarker([pt[0], pt[1]], {
          radius: pt[2] * 8,
          fillColor: color,
          color: 'rgba(255,255,255,0.4)',
          weight: 0.5,
          fillOpacity: 0.65
        }).addTo(markerLayer);
      }
    });
  });

function setLayer(mode) {
  var btns = document.querySelectorAll('#toggle button');
  btns.forEach(function(b) { b.classList.remove('on'); });
  btns.forEach(function(b) {
    if ((mode === 'heat' && b.textContent.indexOf('热力') >= 0) ||
        (mode === 'point' && b.textContent.indexOf('点位') >= 0)) b.classList.add('on');
  });
  if (mode === 'heat') {
    if (markerLayer) map.removeLayer(markerLayer);
    if (heatLayer) map.addLayer(heatLayer);
  } else {
    if (heatLayer) map.removeLayer(heatLayer);
    if (markerLayer) map.addLayer(markerLayer);
  }
}
</script>
</body>
</html>
