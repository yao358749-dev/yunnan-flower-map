<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纹绣月季 · 全国空间热度</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf6ee;height:100vh;overflow:hidden;font-family:'KaiTi','STKaiti','楷体',serif}
#map{width:100%;height:100%;background:#faf6ee}
#top{position:absolute;top:24px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none;text-align:center}
#top h1{font-size:26px;font-weight:700;color:#4a3028;letter-spacing:4px}
#top span{font-size:12px;color:#a09080;letter-spacing:1px}
#legend{position:absolute;bottom:28px;right:28px;z-index:999;background:rgba(255,255,255,0.88);border-radius:10px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,0.05)}
#legend .t{font-size:11px;font-weight:700;color:#4a3028;margin-bottom:6px}
#legend .bar{width:150px;height:6px;border-radius:3px}
#legend .l{display:flex;justify-content:space-between;font-size:9px;color:#b0a090;margin-top:3px}
#legend .n{font-size:9px;color:#c0b0a0;margin-top:4px}
#toggle{position:absolute;bottom:28px;left:28px;z-index:999;display:flex;gap:6px}
#toggle button{padding:6px 14px;border-radius:14px;border:1px solid #d8c8b0;background:rgba(255,255,255,0.85);font-family:inherit;font-size:11px;color:#6a5040;cursor:pointer;transition:0.25s}
#toggle button.on{background:#4a3028;color:#f0e4d0;border-color:#4a3028}
.leaflet-control-zoom{border:none!important;box-shadow:0 2px 8px rgba(0,0,0,0.05)!important}
.leaflet-control-zoom a{background:#fff!important;color:#4a3028!important;border-radius:8px!important;margin:3px!important;border:none!important}
</style>
</head>
<body>

<div id="map"></div>
<div id="top"><h1>纹绣月季 · 空间热度</h1><span>Wenxiu Rose Spatial Heat · 5518 POIs · 网红打卡×3 花海×2 旅游×1</span></div>

<div id="toggle">
  <button class="on" onclick="setLayer('heat')">热力图</button>
  <button onclick="setLayer('point')">散点图</button>
</div>

<div id="legend">
  <div class="t">热度</div>
  <div class="bar" style="background:linear-gradient(90deg,#fef0c8,#f5c860,#e89830,#d05520,#9a1a10)"></div>
  <div class="l"><span>低</span><span></span><span></span><span></span><span>高</span></div>
  <div class="n">28城 · 5518点位</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
var heatLayer, markerLayer, chinaLayer, map;

map = L.map('map', {
  center: [32, 108],
  zoom: 5,
  minZoom: 3,
  maxZoom: 14,
  zoomControl: true,
  attributionControl: false
});

// 图层顺序: 底图(淡色) → 中国省界 → 热力
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains: ['1','2','3','4'],
  maxZoom: 18,
  opacity: 0.35
}).addTo(map);

// 中国省界填充层
chinaLayer = L.layerGroup().addTo(map);
fetch('data/china_outline.json')
  .then(r => r.json())
  .then(polys => {
    polys.forEach(p => {
      // 转为[lat,lon]格式
      var latlngs = p.c.map(function(pt) { return [pt[1], pt[0]]; });
      L.polygon(latlngs, {
        fillColor: '#faf3e6',
        fillOpacity: 1,
        color: '#d4c8b0',
        weight: 0.6,
        interactive: false
      }).addTo(chinaLayer);
    });
  });

// 热力数据
fetch('data/wenxiu_heat.json')
  .then(r => r.json())
  .then(data => {
    heatLayer = L.heatLayer(data, {
      radius: 32,
      blur: 22,
      maxZoom: 11,
      max: 1.0,
      gradient: {
        0.0: 'rgba(0,0,0,0)',
        0.1: '#fef0c8',
        0.25: '#f5c860',
        0.45: '#e89830',
        0.65: '#d05520',
        0.85: '#9a1a10',
        1.0: '#680808'
      }
    }).addTo(map);

    markerLayer = L.layerGroup();
    data.forEach(function(pt) {
      if (pt[2] > 0.4) {
        L.circleMarker([pt[0], pt[1]], {
          radius: pt[2] * 7,
          fillColor: pt[2] > 0.75 ? '#d05520' : (pt[2] > 0.55 ? '#e89830' : '#f5c860'),
          color: 'rgba(255,255,255,0.3)',
          weight: 0.4,
          fillOpacity: 0.6
        }).addTo(markerLayer);
      }
    });
  });

function setLayer(mode) {
  var btns = document.querySelectorAll('#toggle button');
  btns.forEach(function(b) { b.classList.remove('on'); });
  btns.forEach(function(b) {
    if ((mode === 'heat' && b.textContent.indexOf('热力') >= 0) ||
        (mode === 'point' && b.textContent.indexOf('散点') >= 0)) b.classList.add('on');
  });
  if (mode === 'heat') {
    if (markerLayer) map.removeLayer(markerLayer);
    if (heatLayer) map.addLayer(heatLayer);
  } else {
    if (heatLayer) map.removeLayer(heatLayer);
    if (markerLayer) map.addLayer(markerLayer);
  }
}
</script>
</body>
</html>
