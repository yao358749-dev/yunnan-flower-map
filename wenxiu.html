<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文秀月季 · 全国空间热度</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf7f0;height:100vh;overflow:hidden;font-family:'KaiTi','STKaiti','楷体',serif}
#map{width:100%;height:100%}
#top{position:absolute;top:24px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none;text-align:center}
#top h1{font-size:26px;font-weight:700;color:#4a3028;letter-spacing:4px}
#top span{font-size:12px;color:#a09080}
#legend{position:absolute;bottom:28px;right:28px;z-index:999;background:rgba(255,255,255,0.9);border-radius:10px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,0.05)}
#legend .t{font-size:11px;font-weight:700;color:#4a3028;margin-bottom:6px}
#legend .bar{width:150px;height:6px;border-radius:3px}
#legend .l{display:flex;justify-content:space-between;font-size:9px;color:#b0a090;margin-top:3px}
#legend .n{font-size:9px;color:#c0b0a0;margin-top:4px}
#toggle{position:absolute;bottom:28px;left:28px;z-index:999;display:flex;gap:6px}
#toggle button{padding:6px 14px;border-radius:14px;border:1px solid #d8c8b0;background:rgba(255,255,255,0.85);font-family:inherit;font-size:11px;color:#6a5040;cursor:pointer;transition:0.25s}
#toggle button.on{background:#4a3028;color:#f0e4d0;border-color:#4a3028}
.leaflet-control-zoom{border:none!important;box-shadow:0 2px 8px rgba(0,0,0,0.05)!important}
.leaflet-control-zoom a{background:#fff!important;color:#4a3028!important;border-radius:8px!important;margin:3px!important;border:none!important}
.leaflet-popup-content{font-family:'KaiTi','STKaiti','楷体',serif;font-size:12px}
.leaflet-popup-content b{color:#4a3028}
</style>
</head>
<body>

<div id="map"></div>
<div id="top"><h1>文秀月季 · 空间热度</h1><span>Wenxiu Rose · 5518 POIs · 点击查看详情</span></div>

<div id="toggle">
  <button class="on" onclick="setLayer('heat')">热力图</button>
  <button onclick="setLayer('point')">散点图</button>
  <button onclick="toggleContour()" id="btn-contour">等值线</button>
</div>

<div id="legend">
  <div class="t">热度</div>
  <div class="bar" style="background:linear-gradient(90deg,#fff0cc,#ffe099,#fcd166,#f7c044,#ed9e2e,#d97a1d)"></div>
  <div class="l"><span>低</span><span></span><span></span><span></span><span>高</span></div>
  <div class="n">网红打卡×3 · 花海×2 · 旅游×1</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
var map = L.map('map', {
  center: [32, 108], zoom: 5, minZoom: 3, maxZoom: 14,
  zoomControl: true, attributionControl: false
});

L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains: ['1','2','3','4'], maxZoom: 18
}).addTo(map);

var heatLayer, markerLayer, contourLayer, heatData, contourOn = false;

fetch('data/wenxiu_heat.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    heatData = data;
    heatLayer = L.heatLayer(data, {
      radius: 30, blur: 20, maxZoom: 11, max: 1.0,
      gradient: {
        0.0: 'rgba(0,0,0,0)', 0.1: '#fff0cc', 0.25: '#ffe099',
        0.45: '#fcd166', 0.65: '#f7c044', 0.85: '#ed9e2e', 1.0: '#d97a1d'
      }
    }).addTo(map);

    // 可点击的高热度点位
    markerLayer = L.layerGroup();
    data.forEach(function(pt, i) {
      if (pt[2] > 0.3) {
        var m = L.circleMarker([pt[0], pt[1]], {
          radius: 8, fillOpacity: 0, color: 'transparent', weight: 0,
          interactive: true
        });
        m.bindPopup(
          '<b>点位 #' + (i+1) + '</b><br>' +
          '坐标: ' + pt[1].toFixed(4) + ', ' + pt[0].toFixed(4) + '<br>' +
          '热度权重: ' + (pt[2]*3).toFixed(1) + '<br>' +
          '<span style="color:#888">点击地图任意位置查看附近热度</span>'
        );
        m.on('click', function(e) {
          L.popup().setLatLng(e.latlng)
            .setContent(this.getPopup().getContent()).openOn(map);
        });
        markerLayer.addLayer(m);
      }
    });

    // 生成等值线数据
    buildContours(data);
  });

// 地图点击: 显示最近点热度
map.on('click', function(e) {
  if (!heatData) return;
  var minDist = Infinity, nearest = null;
  var latlng = e.latlng;
  for (var i = 0; i < heatData.length; i++) {
    var dlat = heatData[i][0] - latlng.lat;
    var dlng = heatData[i][1] - latlng.lng;
    var dist = dlat*dlat + dlng*dlng;
    if (dist < minDist && dist < 0.25) { minDist = dist; nearest = heatData[i]; }
  }
  if (nearest) {
    var w = (nearest[2]*3).toFixed(1);
    L.popup()
      .setLatLng(latlng)
      .setContent('<b>附近热度</b><br>权重: ' + w + '<br>坐标: ' + nearest[1].toFixed(4)+', '+nearest[0].toFixed(4))
      .openOn(map);
  }
});

// 等值线生成
function buildContours(data) {
  contourLayer = L.layerGroup();
  // 用粗网格计算密度, 然后画等值线
  var grid = [], nx = 60, ny = 45;
  var lon0 = 97, lon1 = 122, lat0 = 20, lat1 = 42;
  var dx = (lon1-lon0)/(nx-1), dy = (lat1-lat0)/(ny-1);

  // 初始化网格
  for (var i = 0; i < ny; i++) {
    grid[i] = [];
    for (var j = 0; j < nx; j++) grid[i][j] = 0;
  }

  // 计算每个格点的核密度
  var sigma2 = 4; // 带宽平方
  for (var p = 0; p < data.length; p++) {
    var lat = data[p][0], lon = data[p][1], w = data[p][2];
    var i0 = Math.max(0, Math.floor((lat-dy*3-lat0)/dy));
    var i1 = Math.min(ny-1, Math.ceil((lat+dy*3-lat0)/dy));
    var j0 = Math.max(0, Math.floor((lon-dx*3-lon0)/dx));
    var j1 = Math.min(nx-1, Math.ceil((lon+dx*3-lon0)/dx));
    for (var i = i0; i <= i1; i++) {
      for (var j = j0; j <= j1; j++) {
        var glat = lat0 + i*dy, glon = lon0 + j*dx;
        var d2 = (glat-lat)*(glat-lat) + (glon-lon)*(glon-lon);
        grid[i][j] += w * Math.exp(-d2/sigma2);
      }
    }
  }

  // 找最大密度用于归一化
  var gmax = 0;
  for (var i = 0; i < ny; i++) for (var j = 0; j < nx; j++) if (grid[i][j] > gmax) gmax = grid[i][j];
  if (gmax === 0) return;
  for (var i = 0; i < ny; i++) for (var j = 0; j < nx; j++) grid[i][j] /= gmax;

  // 简单等值线: 在格网中画出阈值边界线段
  var levels = [0.2, 0.4, 0.6, 0.8];
  var colors = ['#ffe099','#fcd166','#f7c044','#ed9e2e'];
  var widths = [0.8, 1.0, 1.2, 1.4];

  for (var li = 0; li < levels.length; li++) {
    var segs = [];
    for (var i = 0; i < ny-1; i++) {
      for (var j = 0; j < nx-1; j++) {
        var v00 = grid[i][j], v10 = grid[i][j+1], v11 = grid[i+1][j+1], v01 = grid[i+1][j];
        var edges = marchingSquare(v00, v10, v11, v01, levels[li]);
        edges.forEach(function(seg) {
          segs.push([
            [lat0 + (i+seg[0][1])*dy, lon0 + (j+seg[0][0])*dx],
            [lat0 + (i+seg[1][1])*dy, lon0 + (j+seg[1][0])*dx]
          ]);
        });
      }
    }
    var joined = joinSegments(segs);
    joined.forEach(function(line) {
      L.polyline(line, {
        color: colors[li], weight: widths[li], opacity: 0.7,
        interactive: false
      }).addTo(contourLayer);
    });
  }
}

function marchingSquare(v00, v10, v11, v01, th) {
  var idx = (v00>=th?8:0)+(v10>=th?4:0)+(v11>=th?2:0)+(v01>=th?1:0);
  var segs = [];
  // 16种情况的线段位置 (插值简化版: 取中点)
  function lerp(a,b,va,vb) { var t=(th-va)/(vb-va+0.0001); return Math.max(0,Math.min(1,t))*0.5+(a+b)/2-0.25; }
  // 四边中点
  var top = [0.5, 0], bot = [0.5, 1], lef = [0, 0.5], rig = [1, 0.5];
  // 简化: 只用端点和粗略插值
  var lut = {
    1: [[[0,0.5],[0.5,1]]],  2: [[[0.5,1],[1,0.5]]], 3: [[[0,0.5],[1,0.5]]],
    4: [[[0.5,0],[1,0.5]]],  5: [[[0,0.5],[0.5,0]],[[0.5,1],[1,0.5]]],
    6: [[[0.5,0],[0.5,1]]],  7: [[[0,0.5],[0.5,0]]],
    8: [[[0,0.5],[0.5,0]]],  9: [[[0.5,0],[0.5,1]]],
    10: [[[0,0.5],[0.5,0]],[[0.5,1],[1,0.5]]], 11: [[[0,0.5],[1,0.5]]],
    12: [[[0.5,1],[1,0.5]]], 13: [[[0,0.5],[0.5,1]]], 14: [[[0.5,0],[1,0.5]]]
  };
  return lut[idx] || [];
}

function joinSegments(segs) {
  if (segs.length === 0) return [];
  var remaining = segs.slice();
  var lines = [];
  while (remaining.length > 0) {
    var line = [remaining[0][0], remaining[0][1]];
    var end = remaining[0][1];
    remaining.splice(0,1);
    var changed = true;
    while (changed) {
      changed = false;
      for (var i = 0; i < remaining.length; i++) {
        var seg = remaining[i];
        if (Math.abs(seg[0][0]-end[0])<0.001 && Math.abs(seg[0][1]-end[1])<0.001) {
          line.push(seg[1]); end = seg[1]; remaining.splice(i,1); changed = true; break;
        }
        if (Math.abs(seg[1][0]-end[0])<0.001 && Math.abs(seg[1][1]-end[1])<0.001) {
          line.push(seg[0]); end = seg[0]; remaining.splice(i,1); changed = true; break;
        }
      }
    }
    lines.push(line);
  }
  return lines;
}

function toggleContour() {
  contourOn = !contourOn;
  var btn = document.getElementById('btn-contour');
  if (contourOn) {
    map.addLayer(contourLayer);
    btn.classList.add('on');
  } else {
    map.removeLayer(contourLayer);
    btn.classList.remove('on');
  }
}

function setLayer(mode) {
  var btns = document.querySelectorAll('#toggle button');
  btns.forEach(function(b) { b.classList.remove('on'); });
  if (mode === 'heat') {
    btns[0].classList.add('on');
    if (markerLayer) map.removeLayer(markerLayer);
    if (heatLayer) map.addLayer(heatLayer);
  } else {
    btns[1].classList.add('on');
    if (heatLayer) map.removeLayer(heatLayer);
    if (markerLayer) map.addLayer(markerLayer);
  }
}
</script>
</body>
</html>
