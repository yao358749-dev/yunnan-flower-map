<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纹绣月季 · 全国空间热度图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'KaiTi','STKaiti','楷体',serif;background:#faf5ef;height:100vh;overflow:hidden}
#map{width:100%;height:100%}
#top{position:absolute;top:20px;left:28px;z-index:999;pointer-events:none}
#top h1{font-size:24px;font-weight:700;color:#2c3829;letter-spacing:3px;margin-bottom:2px}
#top span{font-size:12px;color:#9a9088}
#legend{position:absolute;bottom:28px;left:28px;z-index:999;background:rgba(255,255,255,0.9);border-radius:12px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
#legend .title{font-size:12px;font-weight:700;color:#2c3829;margin-bottom:8px}
#legend .bar{width:160px;height:8px;border-radius:4px;margin:4px 0}
#legend .labels{display:flex;justify-content:space-between;font-size:10px;color:#999}
#legend .note{font-size:10px;color:#aaa;margin-top:6px}
#toggle{position:absolute;top:22px;right:28px;z-index:999;display:flex;gap:6px}
#toggle button{padding:7px 16px;border-radius:18px;border:1px solid #d8ccb8;background:rgba(255,255,255,0.88);font-family:inherit;font-size:12px;color:#555;cursor:pointer;transition:0.25s}
#toggle button.on{background:#2c3829;color:#e8dcc8;border-color:#2c3829}
.leaflet-control-zoom a{background:#fff!important;color:#2c3829!important;border-radius:8px!important;margin:2px!important;box-shadow:0 1px 4px rgba(0,0,0,0.08)!important}
</style>
</head>
<body>

<div id="map"></div>
<div id="top"><h1>纹绣月季 · 全国空间热度图</h1><span>Wenxiu Rose · National Heat Map · 5518 个花卉景点 POI</span></div>

<div id="toggle">
  <button class="on" onclick="setLayer('heat')">热力</button>
  <button onclick="setLayer('point')">点位</button>
</div>

<div id="legend">
  <div class="title">空间热度</div>
  <div class="bar" style="background:linear-gradient(90deg,#f5e8e0,#e8b4a0,#d4786e,#c04448,#8b2540)"></div>
  <div class="labels"><span>低热度</span><span>中热度</span><span>高热度</span></div>
  <div class="note">5518 点位 · 28 城 · 网红打卡×3 / 花海×2 / 旅游×1</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
var heatLayer, markerLayer, map;

// 全国视野, 初始聚焦云南-西南区域
map = L.map('map', {
  center: [27.5, 104],
  zoom: 7,
  minZoom: 5,
  maxZoom: 15,
  zoomControl: true,
  attributionControl: false,
  wheelPxPerZoomLevel: 80
});

// 高德街道图
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains: ['1','2','3','4'],
  maxNativeZoom: 18,
  maxZoom: 18
}).addTo(map);

fetch('data/wenxiu_heat.json')
  .then(r => r.json())
  .then(data => {
    // 热力层: 粉色→珊瑚→深红渐变
    heatLayer = L.heatLayer(data, {
      radius: 28,
      blur: 18,
      maxZoom: 12,
      max: 1.0,
      gradient: {
        0.1: '#f5e8e0',
        0.3: '#e8b4a0',
        0.5: '#d4786e',
        0.7: '#c04448',
        0.85: '#9e2d44',
        1.0: '#8b2540'
      }
    }).addTo(map);

    // 点位层(权重>0.5的高热度点)
    markerLayer = L.layerGroup();
    data.forEach(function(pt) {
      if (pt[2] > 0.5) {
        L.circleMarker([pt[0], pt[1]], {
          radius: pt[2] * 8,
          fillColor: pt[2] > 0.8 ? '#8b2540' : (pt[2] > 0.65 ? '#c04448' : '#d4786e'),
          color: '#fff',
          weight: 0.6,
          fillOpacity: 0.7
        }).addTo(markerLayer);
      }
    });
  })
  .catch(function() {
    document.getElementById('map').innerHTML = '<div style="padding:60px;text-align:center;color:#999;font-family:inherit">数据加载中...</div>';
  });

function setLayer(mode) {
  var btns = document.querySelectorAll('#toggle button');
  btns.forEach(function(b) { b.classList.remove('on'); });
  btns.forEach(function(b) {
    if ((mode === 'heat' && b.textContent.indexOf('热力') >= 0) ||
        (mode === 'point' && b.textContent.indexOf('点位') >= 0)) b.classList.add('on');
  });
  if (mode === 'heat') {
    if (markerLayer) map.removeLayer(markerLayer);
    if (heatLayer) map.addLayer(heatLayer);
  } else {
    if (heatLayer) map.removeLayer(heatLayer);
    if (markerLayer) map.addLayer(markerLayer);
  }
}
</script>
</body>
</html>
