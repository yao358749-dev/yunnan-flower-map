<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纹绣月季 · 全国空间热度</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'KaiTi','STKaiti','楷体',serif;background:linear-gradient(170deg,#faf5ef 0%,#f3ece2 50%,#f8f2ea 100%);height:100vh;overflow:hidden}
#map{width:100%;height:100%}
#top{position:absolute;top:20px;left:28px;z-index:999;pointer-events:none}
#top h1{font-size:24px;font-weight:700;color:#2c3829;letter-spacing:3px}
#top span{font-size:12px;color:#8a8070}
#legend{position:absolute;bottom:28px;left:28px;z-index:999;background:rgba(255,255,255,0.88);border-radius:12px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
#legend .t{font-size:12px;font-weight:700;color:#2c3829;margin-bottom:6px}
#legend .bar{width:150px;height:7px;border-radius:4px;margin:4px 0}
#legend .l{display:flex;justify-content:space-between;font-size:10px;color:#a09080}
#legend .n{font-size:10px;color:#b0a090;margin-top:4px}
#toggle{position:absolute;top:22px;right:28px;z-index:999;display:flex;gap:6px}
#toggle button{padding:6px 16px;border-radius:16px;border:1px solid #d8ccb8;background:rgba(255,255,255,0.85);font-family:inherit;font-size:12px;color:#6b7060;cursor:pointer;transition:0.25s}
#toggle button.on{background:#2c3829;color:#e6dac8;border-color:#2c3829}
.leaflet-control-zoom a{background:#fff!important;color:#2c3829!important;border-radius:8px!important;margin:2px!important;box-shadow:0 1px 4px rgba(0,0,0,0.06)!important}
</style>
</head>
<body>

<div id="map"></div>
<div id="top"><h1>纹绣月季 · 全国空间热度图</h1><span>Wenxiu Rose · 5518 个花卉景点 POI · 核密度分析</span></div>

<div id="toggle">
  <button class="on" onclick="setLayer('heat')">热力</button>
  <button onclick="setLayer('point')">点位</button>
</div>

<div id="legend">
  <div class="t">空间热度</div>
  <div class="bar" style="background:linear-gradient(90deg,#edf4e8,#b8d4a8,#7bb868,#4a8a3a,#2c5a20)"></div>
  <div class="l"><span>低</span><span>中</span><span>高</span></div>
  <div class="n">网红打卡×3 · 花海景区×2 · 花卉旅游×1 · 28城</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
var heatLayer, markerLayer, map;

map = L.map('map', {
  center: [27.5, 104],
  zoom: 7,
  minZoom: 5,
  maxZoom: 16,
  zoomControl: true,
  attributionControl: false,
  wheelPxPerZoomLevel: 80
});

L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains: ['1','2','3','4'],
  maxNativeZoom: 18, maxZoom: 18
}).addTo(map);

fetch('data/wenxiu_heat.json')
  .then(r => r.json())
  .then(data => {
    heatLayer = L.heatLayer(data, {
      radius: 28, blur: 18, maxZoom: 12, max: 1.0,
      gradient: {
        0.1: '#edf4e8',
        0.3: '#b8d4a8',
        0.5: '#7bb868',
        0.7: '#4a8a3a',
        0.85: '#2c5a20',
        1.0: '#1a3a12'
      }
    }).addTo(map);

    markerLayer = L.layerGroup();
    data.forEach(function(pt) {
      if (pt[2] > 0.5) {
        L.circleMarker([pt[0], pt[1]], {
          radius: pt[2] * 8,
          fillColor: pt[2] > 0.8 ? '#1a3a12' : (pt[2] > 0.65 ? '#4a8a3a' : '#7bb868'),
          color: '#fff', weight: 0.6, fillOpacity: 0.7
        }).addTo(markerLayer);
      }
    });
  });

function setLayer(mode) {
  var btns = document.querySelectorAll('#toggle button');
  btns.forEach(function(b) { b.classList.remove('on'); });
  btns.forEach(function(b) {
    if ((mode === 'heat' && b.textContent.indexOf('热力') >= 0) ||
        (mode === 'point' && b.textContent.indexOf('点位') >= 0)) b.classList.add('on');
  });
  if (mode === 'heat') {
    if (markerLayer) map.removeLayer(markerLayer);
    if (heatLayer) map.addLayer(heatLayer);
  } else {
    if (heatLayer) map.removeLayer(heatLayer);
    if (markerLayer) map.addLayer(markerLayer);
  }
}
</script>
</body>
</html>
